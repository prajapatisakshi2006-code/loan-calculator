<!DOCTYPE html>
<html>
<head>

<title>Loan Analysis Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="topbar">

<h2>Loan Analysis Dashboard</h2>

<button onclick="toggleTheme()">Toggle Theme</button>

</div>


<div class="container">


<div class="card">

<h1>Loan Calculator</h1>

<input id="amount" type="number" placeholder="Loan Amount">

<input id="rate" type="number" placeholder="Interest Rate (%)">

<input id="months" type="number" placeholder="Loan Duration (Months)">

<input id="salary" type="number" placeholder="Monthly Salary (optional)">

<button onclick="calculateLoan()">Calculate</button>

<button onclick="clearForm()">Clear</button>


<div class="result">

<p>Monthly EMI: <span id="emi">-</span></p>

<p>Total Payment: <span id="payment">-</span></p>

<p>Total Interest: <span id="interest">-</span></p>

<p id="warning"></p>

</div>


<canvas id="loanChart"></canvas>

<canvas id="balanceChart"></canvas>

<button onclick="downloadPDF()">Download EMI PDF</button>

</div>



<div class="tableContainer">

<h2>EMI Schedule</h2>

<table id="schedule">

<thead>

<tr>

<th>Month</th>
<th>EMI</th>
<th>Interest</th>
<th>Principal</th>
<th>Balance</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>



<div class="card">

<h2>Compare Loans</h2>

<input id="amount2" type="number" placeholder="Loan Amount">

<input id="rate2" type="number" placeholder="Interest Rate (%)">

<input id="months2" type="number" placeholder="Loan Duration">

<button onclick="compareLoans()">Compare Loans</button>

<p id="compareResult"></p>

</div>



<div class="history">

<h2>Loan History</h2>

<ul id="historyList"></ul>

</div>


</div>

<script src="script.js"></script>

</body>
</html>
